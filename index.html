<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>系統登入</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="box">
    <h3>系統登入</h3>
    <input type="text" id="sysUser" placeholder="員工編號">
    <input type="password" id="sysPwd" placeholder="密碼">
    <button onclick="runLogin()">登入</button>
    <div id="status"></div>
</div>

<script>
    // 1. 初始化 (用 IIFE 寫法確保只執行一次，防重複宣告)
    (function() {
        if (!window.supabase) {
            const SUPABASE_URL = "https://tfgtvtceiozvnujiiiqj.supabase.co";
            const SUPABASE_KEY = "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK";
            window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
    })();

    // 2. 登入函數 (改名為 runLogin 以對應你的 HTML 按鈕)
    async function runLogin() {
        const user = document.getElementById('sysUser').value;
        const pwd = document.getElementById('sysPwd').value;
        const status = document.getElementById('status');

        if (!user || !pwd) {
            alert("請輸入帳號與密碼");
            return;
        }

        status.innerText = "驗證中...";
        
        try {
            // 查詢資料庫
            const { data, error } = await window.supabase
                .from('users_auth')
                .select('*')
                .eq('employee_id', user)
                .eq('password', pwd)
                .single();

            if (error || !data) {
                throw new Error("帳號或密碼錯誤");
            }

            status.style.color = "green";
            status.innerText = "成功！";
            alert("歡迎登入，" + data.full_name);

        } catch (e) {
            status.style.color = "red";
            status.innerText = e.message;
        }
    }
</script>
</body>
</html>
