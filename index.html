<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>系統登入</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 簡單的奶茶色系風格 */
        body { background-color: #f5efe6; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dcdcdc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #a68b75; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box" id="loginScreen">
    <h3>系統登入</h3>
    <input type="text" id="sysUser" placeholder="員工編號">
    <input type="password" id="sysPwd" placeholder="密碼">
    <button onclick="loginSys()">系統登入</button>
    <p id="loginError" style="color: red; display: none;"></p>
</div>

<script>
    // 2. 初始化 Supabase
    const SUPABASE_URL = "https://tfgtvtceiozvnujiiiqj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. 登入核心函數
    async function loginSys() {
        const user = document.getElementById('sysUser').value;
        const pwd = document.getElementById('sysPwd').value;
        const btn = document.querySelector('button');
        const errDiv = document.getElementById('loginError');

        btn.innerText = "驗證中...";
        btn.disabled = true;
        errDiv.style.display = "none";

        try {
            // 從 users_auth 表查找資料
            const { data, error } = await supabase
                .from('users_auth')
                .select('*')
                .eq('employee_id', user)
                .eq('password', pwd)
                .single();

            if (error || !data) throw new Error("帳號或密碼錯誤");

            // 登入成功
            alert("登入成功，歡迎 " + data.full_name);
            console.log("使用者資料:", data);
            
            // 這裡呼叫你原本的介面切換邏輯
            // applyAuth(data.full_name, ...);

        } catch (err) {
            errDiv.innerText = err.message;
            errDiv.style.display = "block";
            btn.innerText = "系統登入";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
