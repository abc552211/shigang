<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <input type="text" id="sysUser" placeholder="員工編號">
    <input type="password" id="sysPwd" placeholder="密碼">
    <button onclick="checkLogin()">登入</button>
    <div id="status"></div>

    <script>
        // 強制初始化
        window.sb = supabase.createClient(
            "https://tfgtvtceiozvnujiiiqj.supabase.co",
            "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK"
        );

        async function checkLogin() {
            const user = document.getElementById('sysUser').value;
            const pwd = document.getElementById('sysPwd').value;
            
            try {
                const { data, error } = await window.sb
                    .from('users_auth')
                    .select('*')
                    .eq('employee_id', user)
                    .eq('password', pwd)
                    .single();

                if (error || !data) throw new Error("帳密錯誤");
                
                document.getElementById('status').innerText = "成功！";
                alert("登入成功");
            } catch (e) {
                document.getElementById('status').innerText = e.message;
            }
        }
    </script>
</body>
</html>
