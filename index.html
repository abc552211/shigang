<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>測試登入</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 250px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3>系統測試</h3>
    <input type="text" id="user" placeholder="員工編號">
    <input type="password" id="pwd" placeholder="密碼">
    <button onclick="runLogin()">登入</button>
    <div id="status"></div>
</div>

<script>
    // 初始化 Supabase
    const supabase = supabase.createClient(
        "https://tfgtvtceiozvnujiiiqj.supabase.co",
        "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK"
    );

    async function runLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pwd').value;
        const status = document.getElementById('status');

        status.innerText = "驗證中...";

        try {
            // 查詢資料庫
            const { data, error } = await supabase
                .from('users_auth')
                .select('*')
                .eq('employee_id', u)
                .eq('password', p)
                .single();

            if (error || !data) {
                status.style.color = "red";
                status.innerText = "帳密錯誤";
            } else {
                status.style.color = "green";
                status.innerText = "成功！";
            }
        } catch (e) {
            status.style.color = "red";
            status.innerText = "發生錯誤：" + e.message;
        }
    }
</script>
</body>
</html>
