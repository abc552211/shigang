<!DOCTYPE html>
<html>
<body>
    <input type="text" id="sysUser" placeholder="員工編號">
    <input type="password" id="sysPwd" placeholder="密碼">
    <button onclick="runLogin()">登入</button>
    <div id="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 確保 supabase 物件被定義
        const { createClient } = supabase;
        const supabase = createClient(
            "https://tfgtvtceiozvnujiiiqj.supabase.co",
            "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK"
        );

        async function runLogin() {
            const user = document.getElementById('sysUser').value;
            const pwd = document.getElementById('sysPwd').value;
            const status = document.getElementById('status');

            status.innerText = "驗證中...";

            try {
                // 這裡明確呼叫我們上面初始化的 supabase 物件
                const { data, error } = await supabase
                    .from('users_auth')
                    .select('*')
                    .eq('employee_id', user)
                    .eq('password', pwd)
                    .single();

                if (error) throw error;
                if (!data) throw new Error("查無此人");

                status.innerText = "成功！";
                alert("登入成功");
            } catch (e) {
                status.innerText = "錯誤: " + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
